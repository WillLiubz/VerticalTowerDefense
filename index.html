<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Vertical Defense - Demo</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  background: #0a0e1a;
  display: flex;
  justify-content: center;
  align-items: flex-start;
  min-height: 100vh;
  font-family: 'Segoe UI', 'Microsoft YaHei', sans-serif;
  color: #fff;
  overflow-x: hidden;
  margin: 0;
  padding: 0;
}
#gameWrapper {
  width: 480px;
  max-width: 100vw;
  display: flex;
  flex-direction: column;
}
#hud {
  background: #131928;
  padding: 6px 12px;
  display: flex;
  justify-content: space-around;
  align-items: center;
  border-bottom: 2px solid #1e3a5f;
  height: 44px;
  flex-shrink: 0;
}
.hud-item {
  display: flex;
  align-items: center;
  gap: 4px;
  font-size: 15px;
  font-weight: bold;
}
.hud-item span { min-width: 28px; text-align: left; }
#gameCanvas {
  display: block;
  background: #0d1b2a;
  flex-shrink: 0;
  margin: 0;
  padding: 0;
}
#bottomUI {
  background: #131928;
  padding: 6px 8px;
  border-top: 2px solid #1e3a5f;
  flex-shrink: 0;
  margin: 0;
}
#buffsDisplay {
  display: flex;
  gap: 6px;
  flex-wrap: wrap;
  min-height: 20px;
  margin-bottom: 4px;
}
.buff-tag {
  background: #1a3a1a;
  border: 1px solid #2a7a2a;
  border-radius: 4px;
  padding: 1px 6px;
  font-size: 11px;
  color: #aaffaa;
}
#shopRow {
  display: flex;
  gap: 6px;
  margin-bottom: 6px;
  align-items: center;
}
.btn {
  background: #1a2a4a;
  color: #fff;
  border: 2px solid #2a4a8a;
  border-radius: 8px;
  padding: 6px 10px;
  cursor: pointer;
  font-size: 13px;
  transition: background 0.15s, border-color 0.15s;
  white-space: nowrap;
  font-family: inherit;
}
.btn:hover:not(:disabled) { background: #2a3a6a; }
.btn:disabled { opacity: 0.35; cursor: not-allowed; }
.btn.pack-normal  { border-color: #666; }
.btn.pack-advanced{ border-color: #4488ff; background: #112240; }
.btn.pack-rare    { border-color: #aa44ff; background: #1a1240; }
.btn.pack-epic    { border-color: #ffaa00; background: #2a1a00; box-shadow: 0 0 8px #ffaa0066; }
.btn.gamble-btn   { border-color: #cc4444; background: #2a1010; }
.btn.wave-btn     { border-color: #2a8a2a; background: #0d2a0d; }
.btn.auto-merge-btn        { border-color: #7744aa; background: #1a0e2a; }
.btn.auto-merge-btn.active { border-color: #cc88ff; background: #2d1050; box-shadow: 0 0 8px #aa66ff66; color: #dd99ff; }
#cardArea {
  display: flex;
  gap: 4px;
  min-height: 78px;
  background: #0d1220;
  border: 1px solid #1e3a5f;
  border-radius: 8px;
  padding: 5px;
  margin-bottom: 5px;
  align-items: center;
  flex-wrap: wrap;
}
#cardArea .empty-hint {
  color: #445;
  font-size: 12px;
  width: 100%;
  text-align: center;
}
.card {
  width: 66px;
  height: 68px;
  background: linear-gradient(160deg, #1a1a3e, #2a2a5e);
  border: 2px solid #3344aa;
  border-radius: 8px;
  padding: 3px;
  cursor: pointer;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: space-between;
  font-size: 9px;
  text-align: center;
  transition: transform 0.12s, border-color 0.12s;
  user-select: none;
  flex-shrink: 0;
}
.card:hover { transform: translateY(-4px); border-color: #7788ff; }
.card.selected { border-color: #ffff00; box-shadow: 0 0 8px #ffff00aa; }
.card.lv1 { border-color: #666; }
.card.lv2 { border-color: #4488ff; background: linear-gradient(160deg, #0a1a3a, #1a2a5a); }
.card.lv3 { border-color: #ffaa00; background: linear-gradient(160deg, #2a1a00, #3a2a10); box-shadow: 0 0 5px #ffaa0055; }
.card.selected.lv1 { border-color: #ffff00; }
.card.selected.lv2 { border-color: #ffff00; }
.card.selected.lv3 { border-color: #ffff00; }
.card.usable { animation: cardGlow 0.8s infinite; }
@keyframes cardGlow { 0%,100% { box-shadow: 0 0 6px #44ff4488; } 50% { box-shadow: 0 0 12px #44ff44cc; } }
@keyframes mergeOut {
  0%   { transform: scale(1)    translateY(0);   opacity: 1;   filter: brightness(1); }
  30%  { transform: scale(1.22) translateY(-9px); opacity: 0.9; filter: brightness(2.5); }
  100% { transform: scale(0.05) translateY(0);   opacity: 0;   filter: brightness(4); }
}
@keyframes mergeAppear {
  0%   { transform: scale(0);    opacity: 0;   filter: brightness(3) drop-shadow(0 0 14px #cc88ff); }
  55%  { transform: scale(1.28); opacity: 1;   filter: brightness(1.8) drop-shadow(0 0 8px #cc88ff); }
  78%  { transform: scale(0.93);               filter: brightness(1.2); }
  100% { transform: scale(1);    opacity: 1;   filter: none; }
}
.card.merging-out  { animation: mergeOut    0.24s ease-in   forwards; pointer-events: none; }
.card.merge-appear { animation: mergeAppear 0.40s cubic-bezier(0.34,1.56,0.64,1) both; }
.card-icon { font-size: 22px; line-height: 1.2; }
.card-name { font-size: 9px; line-height: 1.1; color: #ccc; }
.card-meta { font-size: 8px; color: #888; }
/* Card stacking */
.card-slot { position: relative; flex-shrink: 0; width: 66px; height: 68px; }
.card-back {
  position: absolute; width: 66px; height: 68px;
  pointer-events: none; border-radius: 8px; border: 2px solid;
  display: flex; flex-direction: column; align-items: center;
  justify-content: center; gap: 2px; opacity: 0.62;
}
.card-back.lv1 { border-color: #444; background: linear-gradient(160deg,#111128,#1a1a40); }
.card-back.lv2 { border-color: #2255aa; background: linear-gradient(160deg,#060e1e,#0d1835); }
.card-back.lv3 { border-color: #996600; background: linear-gradient(160deg,#160e00,#221500); }
.card-count-badge {
  position: absolute; top: -5px; right: -5px;
  background: #aa44ee; color: #fff; font-size: 9px; font-weight: bold;
  border-radius: 7px; padding: 1px 4px; z-index: 20; pointer-events: none;
}
#supportRow {
  display: flex;
  gap: 4px;
  align-items: center;
  margin-bottom: 5px;
}
.support-buy-btn {
  flex: 1;
  background: #0d1b0d;
  border: 1px solid #1a3a1a;
  border-radius: 6px;
  padding: 3px 2px;
  cursor: pointer;
  font-size: 10px;
  text-align: center;
  color: #8a8;
  font-family: inherit;
  transition: border-color 0.12s, color 0.12s;
}
.support-buy-btn:hover { border-color: #4a8;  color: #afa; }
/* weaponRow styles removed; UI now draws weapon icon directly on canvas
   (weapon-row HTML is no longer present). */
/* Modals */
#overlay {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.75);
  z-index: 50;
}
#gamblingModal, #gameOverScreen, #packRevealModal {
  display: none;
  position: fixed;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  background: #131928;
  border-radius: 14px;
  padding: 20px;
  z-index: 60;
  text-align: center;
  min-width: 280px;
  max-width: 90vw;
}
#gamblingModal { border: 2px solid #6633aa; }
#gamblingModal h3 { color: #ffaa00; margin-bottom: 12px; font-size: 18px; }
#packRevealModal  { border: 2px solid #8844cc; box-shadow: 0 0 30px #8844cc33; }
#packRevealModal h3 { color: #cc88ff; margin-bottom: 14px; font-size: 18px; }
#packRevealCards  { display: flex; gap: 10px; justify-content: center; flex-wrap: wrap; margin-bottom: 4px; }
.gamble-opt {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 10px 14px;
  background: #0d1220;
  border: 1px solid #2a2a5a;
  border-radius: 8px;
  margin: 6px 0;
  cursor: pointer;
  transition: background 0.15s, border-color 0.15s;
}
.gamble-opt:hover { background: #1a2240; border-color: #5555aa; }
.bet-row { display: flex; align-items: center; gap: 8px; margin: 10px 0; }
.bet-row label { font-size: 13px; color: #aaa; white-space: nowrap; }
#betInput {
  flex: 1;
  background: #0d1220;
  border: 1px solid #3355aa;
  color: #fff;
  padding: 6px 10px;
  border-radius: 6px;
  font-size: 15px;
  text-align: center;
  font-family: inherit;
}
#gameOverScreen { border: 3px solid #ff4444; }
#gameOverScreen.victory { border-color: #44ff44; }
#gameOverScreen h2 { font-size: 26px; margin-bottom: 10px; }
#gameOverScreen p  { color: #aaa; font-size: 13px; }
</style>
</head>
<body>
<div id="gameWrapper">
  <!-- HUD -->
  <div id="hud">
    <div class="hud-item">🪙<span id="hdGold">50</span></div>
    <div class="hud-item">🌊<span id="hdWave">0/10</span></div>
    <div class="hud-item">❤️<span id="hdHp">20</span></div>
    <div class="hud-item">⏱️<span id="hdTime">3:00</span></div>
  </div>

  <!-- Battle Canvas -->
  <canvas id="gameCanvas" width="480" height="450"></canvas>

  <!-- Bottom UI -->
  <div id="bottomUI">
    <div id="buffsDisplay"></div>

    <!-- Shop row -->
    <div id="shopRow">
      <button class="btn pack-normal" id="buyPackBtn" onclick="buyPack()">🎁 卡包 5g</button>
      <button class="btn gamble-btn"  id="gamblingBtn" onclick="openGambling()" disabled>🎲 赌博</button>
      <button class="btn" id="rulesBtn" onclick="openRules()">📘 规则</button>
      <button class="btn auto-merge-btn" id="autoMergeBtn" onclick="toggleAutoMerge()">⚡ 自动合成</button>
      <div style="flex:1"></div>
      <span id="gamblesLeftLabel" style="font-size:11px;color:#888;white-space:nowrap">赌博:3次</span>
      <button class="btn wave-btn" id="waveBtn" onclick="startNextWave()">▶ 第1波</button>
    </div>

    <!-- Card hand -->
    <div id="cardArea">
      <div class="empty-hint">购买卡包获得卡牌 · 点选后点击使用 · 点两张相同牌合成升级</div>
    </div>

    <!-- Support -->
    <div id="supportRow">
      <span style="font-size:10px;color:#666;white-space:nowrap">支援:</span>
      <button class="support-buy-btn" onclick="buySupportUnit(0)">🔫突击兵<br>15g</button>
      <button class="support-buy-btn" onclick="buySupportUnit(1)">🎯狙击手<br>25g</button>
      <button class="support-buy-btn" onclick="buySupportUnit(2)">💣掷弹手<br>30g</button>
      <button class="support-buy-btn" onclick="buySupportUnit(3)">🔮法师<br>40g</button>
    </div>

    <!-- Card hand -->
    <div id="cardArea">
<div id="weaponSelectorModal" style="display:none;position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);background:#0f1722;border:2px solid #4466aa;border-radius:12px;padding:14px;z-index:70;max-width:90vw;">
  <h3 style="color:#88ccff;margin-bottom:12px;">⚔️ 选择武器 (允许反复切换)</h3>
  <div id="weaponSelectorContent" style="display:flex;flex-direction:column;gap:8px;max-height:60vh;overflow-y:auto;"></div>
  <button class="btn" onclick="closeWeaponSelector()" style="margin-top:12px;width:100%;">关闭</button>
</div>

<!-- Gambling Modal -->
<div id="overlay" onclick="closeAllModals()"></div>
<div id="gamblingModal">
  <h3>🎲 幸运转盘</h3>
  <div class="bet-row">
    <label>投注:</label>
    <input type="number" id="betInput" value="10" min="1">
    <span style="font-size:12px;color:#888">金币</span>
  </div>
  <div style="font-size:11px;color:#666;margin-bottom:6px">剩余次数: <span id="gamblesLeft">3</span>/3 &nbsp;|&nbsp; 最多投注50%金币</div>
  <div class="gamble-opt" onclick="doGamble('conservative')">
    <span>😊 保守</span><span style="color:#44ff44">×1.5</span><span style="color:#888;font-size:12px">胜率70%</span>
  </div>
  <div class="gamble-opt" onclick="doGamble('balanced')">
    <span>⚖️ 平衡</span><span style="color:#ffaa00">×2.0</span><span style="color:#888;font-size:12px">胜率50%</span>
  </div>
  <div class="gamble-opt" onclick="doGamble('aggressive')">
    <span>🔥 激进</span><span style="color:#ff4444">×3.0</span><span style="color:#888;font-size:12px">胜率30%</span>
  </div>
  <button class="btn" onclick="closeGambling()" style="margin-top:10px;width:100%">取消</button>
</div>

<!-- Pack Reveal Modal -->
<div id="packRevealModal">
  <h3>🎁 获得卡牌</h3>
  <div id="packRevealCards"></div>
  <button class="btn" onclick="closePackReveal()" style="margin-top:12px;width:100%">收下</button>
</div>

<!-- Game Over -->
<div id="gameOverScreen">
  <h2 id="goTitle">游戏结束</h2>
  <p id="goMsg"></p>
  <button class="btn" onclick="location.reload()" style="margin-top:16px;width:100%">再来一局</button>
</div>

<!-- Rules Modal -->
<div id="rulesModal" style="display:none;position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);background:#0f1722;border:2px solid #4466aa;border-radius:12px;padding:14px;z-index:70;max-width:90vw;max-height:80vh;overflow:auto;">
  <h3 style="color:#88ccff;margin-bottom:8px">📘 游戏完整规则</h3>
  <div id="rulesContent" style="white-space:pre-wrap;color:#ddd;font-size:13px;line-height:1.4;"></div>
  <button class="btn" onclick="closeRules()" style="margin-top:12px;width:100%">关闭</button>
</div>

<script>
'use strict';
// ============================================================
// RULES MODAL
// ============================================================
const RULES_MD = `# Vertical Defense - 完整玩家规则

## 武器切换（回到武器展示位置）
- 操作说明：武器切换完成后，UI/镜头/角色焦点应回到"武器展示位置"。
- 实现：切换完成触发回位过渡动画（位置、缩放、朝向同步），过渡时长：0.2–0.3s，缓动：ease-out。

## 横向支援（左右区域回位 & 包装为"士兵"）
- 操作说明：横向支援操控结束后，角色自动回到对应的左右预设站点（靠近左/右区边界）。
- 实现：回位采用插值移动，站位目标为左右预设站点；过渡时长：0.25–0.35s。角色在 UI/数据包装中统一标记为"士兵"。
`;

function openRules() {
  document.getElementById('rulesContent').textContent = RULES_MD.trim();
  document.getElementById('overlay').style.display    = 'block';
  document.getElementById('rulesModal').style.display = 'block';
}
function closeRules() {
  document.getElementById('overlay').style.display    = 'none';
  document.getElementById('rulesModal').style.display = 'none';
}

function closeAllModals() {
  closeGambling();
  closeRules();
  closeWeaponSelector();
  closePackReveal();
}

function openWeaponSelector() {
  const container = document.getElementById('weaponSelectorContent');
  container.innerHTML = '';
  
  for (let i = 0; i < WEAPON_DEFS.length; i++) {
    const def = WEAPON_DEFS[i];
    const lv = G.weaponLevels[i];
    const isCurrent = G.curWeapon === i;
    
    const btn = document.createElement('button');
    btn.className = 'btn' + (isCurrent ? ' active-weapon' : '');
    btn.style.cssText = `
      padding: 10px;
      text-align: left;
      border: 2px solid ${isCurrent ? '#88ff88' : '#2a5a8a'};
      background: ${isCurrent ? '#0a2a0a' : '#0f1722'};
      cursor: pointer;
      transition: all 0.2s;
    `;
    btn.innerHTML = `<div style="display:flex;justify-content:space-between;align-items:center;">
      <span>${def.icon} <strong>${def.name}</strong> - Lv${lv}</span>
      <span style="color:#aaa;font-size:12px;">
        ${isCurrent ? '✓ 当前' : ''}
      </span>
    </div>
    <div style="font-size:11px;color:#888;margin-top:4px;">
      💥 伤害: ${def.dmg} | 💫 射速: ${def.rate}ms | 🎯 射程: ${def.range}
    </div>`;
    
    btn.onclick = () => {
      switchToWeapon(i);
      openWeaponSelector(); // 重新刷新列表
    };
    
    container.appendChild(btn);
  }
  
  document.getElementById('overlay').style.display = 'block';
  document.getElementById('weaponSelectorModal').style.display = 'block';
}

function closeWeaponSelector() {
  document.getElementById('overlay').style.display = 'none';
  document.getElementById('weaponSelectorModal').style.display = 'none';
}

function switchToWeapon(weaponIndex) {
  if (G.weaponSwitchCd > 0) { flash('武器冷却中...'); return; }
  if (G.curWeapon === weaponIndex) { flash('已经是这个武器'); return; }
  
  G.curWeapon = weaponIndex;
  G.weaponSwitchCd = 3000;
  G.weaponCd = 0;
  
  const def = WEAPON_DEFS[G.curWeapon];
  const lv = G.weaponLevels[G.curWeapon];
  flash(`✓ 切换至 ${def.icon}${def.name} (Lv${lv})`);
  updateWeaponUI();
}
// ============================================================
const CW = 480, CH = 450;
const FIELD_L = 60, FIELD_R = 420;
const SPAWN_Y  = 30;
const DEFENSE_Y = 430;
// weapon area should sit high enough that the platform and upgrade button
// both stay well above the defense line (including a safety margin).
// button bottom sits at y+33, so we require y <= DEFENSE_Y - 43.
const WEAPON_Y = DEFENSE_Y - 50;

const SUPPORT_ROWS_Y = [120, 220]; // two rows

const WEAPON_DEFS = [
  { name:'机枪', icon:'🔫', dmg:10,  rate:120,  range:450, type:'mg',     lvMul:[1,1.3,1.7,2.2,2.8,3.5] },
  { name:'狙击', icon:'🎯', dmg:50,  rate:1200, range:500, type:'sniper', pierce:true, lvMul:[1,1.2,1.5,1.9,2.4,3.0] },
  { name:'激光', icon:'⚡', dmg:3,   rate:40,   range:400, type:'laser',  lvMul:[1,1.4,1.9,2.5,3.2,4.0] },
  { name:'火箭', icon:'🚀', dmg:30,  rate:800,  range:450, type:'rocket', aoe:true, aoeR:60, lvMul:[1,1.25,1.6,2.0,2.5,3.1] },
  // 新增第五种武器
  { name:'等离子', icon:'💥', dmg:25, rate:700, range:430, type:'plasma', aoe:true, aoeR:50, lvMul:[1,1.3,1.7,2.2,2.8,3.6] },
];

const SUPPORT_DEFS = [
  { name:'突击兵', icon:'🔫', dmg:15,  shots:20, range:180, rate:400,  cost:15 },
  { name:'狙击手', icon:'🎯', dmg:60,  shots:5,  range:350, rate:1000, cost:25, pierce:true },
  { name:'掷弹手', icon:'💣', dmg:40,  shots:8,  range:230, rate:600,  cost:30, aoe:true, aoeR:50 },
  { name:'法师',   icon:'🔮', dmg:100, shots:3,  range:300, rate:1500, cost:40, aoe:true, aoeR:80 },
];

const CARD_DEFS = [
  { id:'damage', name:'火力强化', icon:'⚔️', type:'buff',    stat:'damage', fx:[0.20, 0.50, 1.20] },
  { id:'speed',  name:'急速射击', icon:'⚡', type:'buff',    stat:'speed',  fx:[0.15, 0.37, 0.90] },
  { id:'range',  name:'射程扩展', icon:'🔭', type:'buff',    stat:'range',  fx:[0.25, 0.62, 1.50] },
  { id:'gold',   name:'赏金猎人', icon:'🪙', type:'buff',    stat:'gold',   fx:[0.30, 0.75, 1.80] },
  { id:'mg_ammo',    name:'机枪弹链', icon:'🔗', type:'buff', wpn:0, stat:'damage', fx:[0.35, 0.80, 1.80], desc:'机枪专用' },
  { id:'sniper_focus', name:'狙击聚焦', icon:'🎯', type:'buff', wpn:1, stat:'speed',  fx:[0.40, 0.90, 2.00], desc:'狙击专用' },
  { id:'laser_burst', name:'激光脉冲',   icon:'⚡⚡', type:'buff', wpn:2, stat:'speed', fx:[0.50, 1.20, 2.50], desc:'激光专用' },
  { id:'rocket_spread',name:'火箭扩散',  icon:'🚀🚀', type:'buff', wpn:3, stat:'range', fx:[0.45, 1.10, 2.30], desc:'火箭专用' },
  // 新武器专用卡
  { id:'plasma_surge', name:'等离子冲击', icon:'💥💥', type:'buff', wpn:4, stat:'speed', fx:[0.45,1.0,2.0], desc:'等离子专用' },
  { id:'firepower_sync', name:'火力链接', icon:'🔗🔥', type:'synergy', needs:['damage','speed'], bonus:[1.25, 1.50, 1.80], desc:'需: 火力强化+急速射击' },
  { id:'precision_shot', name:'精准狙击', icon:'🎯⚡', type:'synergy', needs:['sniper_focus','range'], bonus:[1.30, 1.60, 2.00], desc:'需: 狙击聚焦+射程' },

// ============================================================
// CANVAS

let canvas, ctx;

function initCanvas() {
  console.log('[initCanvas] Looking for gameCanvas...');
  canvas = document.getElementById('gameCanvas');
  console.log('[initCanvas] canvas=', canvas);
  if (!canvas) {
    console.error('[initCanvas] Canvas not found!');

  }
  ctx = canvas.getContext('2d');
  console.log('[initCanvas] ctx=', ctx);
  return true;
}

// ============================================================
// HELPERS
// ============================================================
function rnd(a, b) { return a + Math.random() * (b - a); }
function dist(ax,ay,bx,by) { return Math.hypot(ax-bx, ay-by); }
function weaponX() {
  // Single weapon in center
  return (FIELD_L + FIELD_R) / 2;
}
function supportPos(i) {
  // 0,1 = left side; 2,3 = right side
  const x  = i < 2 ? 30 : CW - 30;
  const y  = SUPPORT_ROWS_Y[i % 2];
  return {x, y, left: i < 2};
}

// ============================================================
// INIT
// ============================================================
function init() {
  console.log('[init] Starting initialization...');
  
  // Initialize canvas first
  if (!initCanvas()) {
    console.error('[init] Failed to initialize canvas!');
    return;
  }
  
  console.log('[init] Canvas initialized. CW=' + CW + ', CH=' + CH);
  updateHUD();
  // weapon UI is rendered on canvas; no DOM element to update
  updateBuffsDisplay();
  updateGamblingBtn();
  
  // Setup event listeners now that canvas is initialized
  console.log('[init] Setting up event listeners...');
  canvas.addEventListener('click', (e) => {
    const rect = canvas.getBoundingClientRect();
    const x = (e.clientX - rect.left) * (CW / rect.width);
    const y = (e.clientY - rect.top) * (CH / rect.height);
    
    // 关卡选择界面
    if (!G.levelStarted && !G.running) {
      const levels = [
        {lv:1, diff:1.0},
        {lv:2, diff:1.3},
        {lv:3, diff:1.7},
        {lv:4, diff:2.2}
      ];
      const btnY = [150, 200, 250, 300];
      for (let i = 0; i < 4; i++) {
        const y_btn = btnY[i];
        if (x >= CW/2 - 80 && x <= CW/2 + 80 && y >= y_btn - 15 && y <= y_btn + 15) {
          // 选择关卡
          G.level = levels[i].lv;
          G.levelDifficulty = levels[i].diff;
          G.levelStarted = true;
          G.wave = 0;
          G.maxWave = 10;
          G.gold = 50;
          G.hp = 20;
          G.defenseHp = G.maxDefenseHp;  // 重置防线血条
          G.activeBuffs = {};
          G.activeSynergies = {};
          G.synergyBuffs = {};
          G.cards = [];  // 清空之前的卡牌
          addInitialCards();  // 添加初始卡牌
          startNextWave();
          return;
        }
      }
    }
    
    // 关卡完成选择界面
    else if (G.levelCompleted && !G.running) {
      // 下一关卡按钮 CW/2 - 70, 230, 140, 35
      if (x >= CW/2 - 70 && x <= CW/2 + 70 && y >= 230 && y <= 265) {
        // 继续下一关卡
        G.level++;
        G.levelDifficulty *= 1.15;  // 提升15%难度
        G.levelCompleted = false;
        G.levelStarted = true;
        G.wave = 0;
        G.maxWave = 10;
        G.gameTime = 180;
        G.defenseHp = G.maxDefenseHp;  // 重置防线血条
        G.activeBuffs = {};
        G.activeSynergies = {};
        G.synergyBuffs = {};
        G.cards = [];  // 清空之前的卡牌
        addInitialCards();  // 添加初始卡牌
        startNextWave();
        return;
      }
      // 离开游戏按钮 CW/2 - 70, 280, 140, 35
      else if (x >= CW/2 - 70 && x <= CW/2 + 70 && y >= 280 && y <= 315) {
        // 返回开局选择
        G.levelStarted = false;
        G.levelCompleted = false;
        G.level = 0;
        G.wave = 0;
        G.running = false;
        G.gold = 50;
        G.hp = 20;
      }
    }
    
    // 游戏进行中 - 点击武器切换或升级
    else if (G.running) {
      const wpX = weaponX(), wpY = WEAPON_Y;
      // Click on weapon icon to open selector
      if (x >= wpX-18 && x <= wpX+18 && y >= wpY-18 && y <= wpY+18) {
        openWeaponSelector();
        return;
      }
      // upgrade button region to right of weapon icon
      const upW = 50, upH = 22;
      const upX = wpX + 28 + upW/2, upY = wpY;
      if (x >= upX - upW/2 && x <= upX + upW/2 && y >= upY - upH/2 && y <= upY + upH/2) {
        upgradeWeapon();
        return;
      }
    }
  });
  
  console.log('[init] Requesting animation frame...');
  requestAnimationFrame(gameLoop);
  console.log('[init] Done!');
}

// ============================================================
// GAME LOOP
// ============================================================
function gameLoop(ts) {
  const dt = G.lastTime ? Math.min(ts - G.lastTime, 50) : 0;
  G.lastTime = ts;

  if (!G.over) {
    if (G.running) {
      console.log('[gameLoop] Running update...');
      update(dt);
    }
    render();
  }
  requestAnimationFrame(gameLoop);
}

// ============================================================
// UPDATE
// ============================================================
function update(dt) {
  G.gameTime -= dt / 1000;
  if (G.gameTime < 0) G.gameTime = 0;

  if (G.freezeMs > 0) G.freezeMs -= dt;
  if (G.slowMs   > 0) { G.slowMs -= dt; if (G.slowMs <= 0) { G.slowMs = 0; G.slowAmt = 0; } }
  if (G.msgTimer > 0) G.msgTimer -= dt;

  // Countdown for next wave
  if (G.countdownMs > 0) {
    G.countdownMs -= dt;
    if (G.countdownMs <= 0) {
      G.countdownMs = 0;
      startNextWave();
    }
  }

  // Spawn
  if (G.waveActive && G.spawnQueue.length > 0) {
    G.spawnTimer -= dt;
    if (G.spawnTimer <= 0) {
      const e = G.spawnQueue.shift();
      spawnEnemy(e.type, e.wave);
      G.spawnTimer = 1100;
    }
  }
  // Wave complete?
  if (G.waveActive && G.spawnQueue.length === 0 && G.enemies.length === 0) {
    waveComplete();
  }

  updateEnemies(dt);
  updateWeapons(dt);
  updateSupport(dt);
  updateBullets(dt);
  updateParticles(dt);



  updateHUD();
}

// ============================================================
// ENEMIES
// ============================================================
function spawnEnemy(type, waveNum) {
  const def = ENEMY_DEFS[type];
  const hpScale = 1 + (waveNum - 1) * 0.2;
  G.enemies.push({
    id: G.eidSeq++, type, def,
    x: rnd(FIELD_L + def.r, FIELD_R - def.r),
    y: SPAWN_Y,
    hp: Math.round(def.hp * hpScale),
    maxHp: Math.round(def.hp * hpScale),
    shield: def.shieldHp || 0,
  });
}

function updateEnemies(dt) {
  const frozen  = G.freezeMs > 0;
  const slowMul = frozen ? 0 : (1 - G.slowAmt);
  const pxPerMs = dt / 16.67;

  for (let i = G.enemies.length - 1; i >= 0; i--) {
    const e = G.enemies[i];

    if (!frozen) {
      e.y += e.def.spd * slowMul * pxPerMs;
    }

    // Healer aura
    if (e.def.healer) {
      for (const o of G.enemies) {
        if (o !== e && dist(e.x,e.y,o.x,o.y) < 80) {
          o.hp = Math.min(o.maxHp, o.hp + 0.4 * pxPerMs);
        }
      }
    }

    // Hit defense line
    if (e.y >= DEFENSE_Y) {
      G.defenseHp -= e.def.dmg || 10;  // 防线扣血
      burst(e.x, DEFENSE_Y, '#ff4444', 4);
      G.enemies.splice(i, 1);
      if (G.defenseHp <= 0) { G.hp--; G.defenseHp = G.maxDefenseHp; }
      if (G.hp <= 0) { triggerGameOver(false); return; }
      updateHUD();
    }
  }
}

// ============================================================
// WEAPONS
// ============================================================
function updateWeapons(dt) {
  // Update cooldowns
  if (G.weaponSwitchCd > 0) G.weaponSwitchCd -= dt;
  G.weaponCd -= dt;
  if (G.weaponCd > 0) return;

  const ti = G.curWeapon;
  const def = WEAPON_DEFS[ti];
  const lv = G.weaponLevels[ti];
  const lvMul = def.lvMul[Math.min(lv - 1, def.lvMul.length - 1)];

  const rangeMul  = 1 + G.buffs.range;
  const speedMul  = 1 + G.buffs.speed;
  const dmgMul    = 1 + G.buffs.damage;
  const synergyBonus = (G.synergyBuffs && G.synergyBuffs.bonus) || 1;
  const range  = def.range * rangeMul;
  const wx     = weaponX(), wy = WEAPON_Y;

  let tgt = null, bestY = -1;
  for (const e of G.enemies) {
    if (dist(wx, wy, e.x, e.y) <= range && e.y > bestY) {
      bestY = e.y; tgt = e;
    }
  }
  if (!tgt) return;

  const dmg = def.dmg * lvMul * dmgMul * synergyBonus;
  G.weaponCd = def.rate / speedMul;

  if (def.type === 'laser') {
    dealDmg(tgt, dmg);
    G.particles.push({type:'laser', x1:wx,y1:wy,x2:tgt.x,y2:tgt.y, life:60, maxLife:60});
  } else if (def.type === 'rocket') {
    fireBullet(wx, wy, tgt, dmg, {btype:'rocket', spd:5, aoe:true, aoeR: def.aoeR * rangeMul});
  } else if (def.type === 'sniper') {
    fireBullet(wx, wy, tgt, dmg, {btype:'sniper', spd:12, pierce:true});
  } else if (def.aoe) {
    // generic aoe projectile for weapons that aren’t rockets but have aoe flag
    fireBullet(wx, wy, tgt, dmg, {btype:'rocket', spd:5, aoe:true, aoeR: def.aoeR * rangeMul});
  } else {
    fireBullet(wx, wy, tgt, dmg, {btype:'mg', spd:11});
  }
}

function fireBullet(fx, fy, tgt, dmg, opts) {
  const dx = tgt.x - fx, dy = tgt.y - fy;
  const d  = Math.hypot(dx, dy) || 1;
  G.bullets.push({
    x:fx, y:fy,
    vx: dx/d * opts.spd,
    vy: dy/d * opts.spd,
    tid: tgt.id, dmg,
    btype: opts.btype || 'bullet',
    pierce: !!opts.pierce,
    aoe:    !!opts.aoe,
    aoeR:   opts.aoeR || 0,
  });
}

function updateBullets(dt) {
  const pxPerMs = dt / 16.67;
  for (let i = G.bullets.length - 1; i >= 0; i--) {
    const b = G.bullets[i];
    b.x += b.vx * pxPerMs;
    b.y += b.vy * pxPerMs;

    if (b.x < -20 || b.x > CW+20 || b.y < -20 || b.y > CH+20) {
      G.bullets.splice(i, 1); continue;
    }

    const r = b.btype === 'rocket' ? 6 : (b.btype === 'mg' ? 10 : 6);
    let hit = false;
    for (let j = G.enemies.length - 1; j >= 0; j--) {
      const e = G.enemies[j];
      if (dist(b.x, b.y, e.x, e.y) < e.def.r + r) {
        if (b.aoe) {
          explode(b.x, b.y, b.aoeR, b.dmg);
          G.bullets.splice(i, 1);
          hit = true; break;
        } else {
          dealDmg(e, b.dmg);
          if (!b.pierce) { G.bullets.splice(i, 1); hit = true; break; }
        }
      }
    }
  }
}

function explode(x, y, r, dmg) {
  burst(x, y, '#ff8800', 10);
  for (let j = G.enemies.length - 1; j >= 0; j--) {
    if (dist(x, y, G.enemies[j].x, G.enemies[j].y) <= r)
      dealDmg(G.enemies[j], dmg);
  }
}

function dealDmg(e, dmg) {
  if (e.shield > 0) {
    e.shield -= dmg;
    burst(e.x, e.y, '#aaaaff', 2);
    if (e.shield > 0) return false;
    dmg = -e.shield; e.shield = 0;
  }
  e.hp -= dmg;
  burst(e.x, e.y, '#ffff88', 2);
  // 添加伤害飘字粒子
  G.particles.push({
    type: 'dmgFloat',
    x: e.x,
    y: e.y,
    dmg: Math.round(dmg),
    life: 1500,
    maxLife: 1500,
    color: '#ff6666'
  });
  if (e.hp <= 0) { killEnemy(e); return true; }
  return false;
}

function killEnemy(e) {
  const idx = G.enemies.indexOf(e);
  if (idx === -1) return;
  const goldMul = 1 + G.buffs.gold;
  G.gold += Math.round(e.def.gold * goldMul);
  burst(e.x, e.y, e.def.color, 8);
  if (e.def.splitter) {
    for (let k = 0; k < 2; k++) {
      G.enemies.push({
        id: G.eidSeq++, type:'normal', def: ENEMY_DEFS.normal,
        x: e.x + (k ? 14 : -14), y: e.y,
        hp:10, maxHp:10, shield:0,
      });
    }
  }
  G.enemies.splice(idx, 1);
  updateGamblingBtn();
}

// ============================================================
// SUPPORT
// ============================================================
function updateSupport(dt) {
  for (let i = 0; i < 4; i++) {
    const s = G.supports[i];
    if (!s) continue;
    s.cd -= dt;
    if (s.cd > 0) continue;

    const def    = SUPPORT_DEFS[s.ti];
    const pos    = supportPos(i);
    const rangeMul = 1 + G.buffs.range;
    const range  = def.range * rangeMul;

    // Find target within horizontal band
    let tgt = null, bestDist = range;
    for (const e of G.enemies) {
      const d = dist(pos.x, pos.y, e.x, e.y);
      if (d < bestDist && Math.abs(e.y - pos.y) < 90) {
        bestDist = d; tgt = e;
      }
    }
    if (!tgt) continue;

    s.cd = def.rate; s.shots--;
    const dmgMul = 1 + G.buffs.damage;
    const synergyBonus = (G.synergyBuffs && G.synergyBuffs.bonus) || 1;
    const dmg    = def.dmg * dmgMul * synergyBonus;

    if (def.aoe) {
      fireBullet(pos.x, pos.y, tgt, dmg, {btype:'rocket', spd:5, aoe:true, aoeR:(def.aoeR||50)*rangeMul});
    } else {
      fireBullet(pos.x, pos.y, tgt, dmg, {btype:'bullet', spd:8, pierce:!!def.pierce});
    }

    if (s.shots <= 0) G.supports[i] = null;
  }
}

function buySupportUnit(ti) {
  const def = SUPPORT_DEFS[ti];
  if (G.gold < def.cost) { flash(`金币不足! 需要 ${def.cost}g`); return; }
  const slot = G.supports.indexOf(null);
  if (slot === -1) { flash('支援槽已满!'); return; }
  G.gold -= def.cost;
  G.supports[slot] = { ti, shots: def.shots, cd: 0 };
  flash(`部署 ${def.icon} ${def.name}`);
  updateHUD();
}

// ============================================================
// SYNERGY CHECK
// ============================================================
function checkSynergies() {
  for (const card of G.cards) {
    if (card.def.type !== 'synergy') continue;
    if (G.activeSynergies && G.activeSynergies[card.id]) continue;
    const hasAll = card.def.needs.every(needId => G.activeBuffs && G.activeBuffs[needId]);
    if (hasAll) { activateSynergy(card); }
  }
}

function activateSynergy(card) {
  if (!G.activeSynergies) G.activeSynergies = {};
  if (!G.synergyBuffs) G.synergyBuffs = {};
  G.activeSynergies[card.id] = true;
  G.synergyBuffs.bonus = card.def.bonus[card.lv - 1];
  const bonus = Math.round((card.def.bonus[card.lv-1] - 1) * 100);
  flash(`✨ Synergy 激活: ${card.def.icon} ${card.def.name} +${bonus}% 伤害加成!`);
}

// ============================================================
// INITIAL CARDS
// ============================================================
function addInitialCards() {
  const initialCardDefs = [
    {id: 'damage', def: CARD_DEFS.find(c => c.id === 'damage')},
    {id: 'speed', def: CARD_DEFS.find(c => c.id === 'speed')},
  ];
  for (const def of initialCardDefs) {
    G.cards.push({
      id: Math.random().toString(36).slice(2),
      def: def.def,
      lv: 1
    });
  }
  flash(`🎁 开局赠送: ${G.cards.map(c => c.def.icon + ' ' + c.def.name).join('  ')}`);
  renderCards();
}

// ============================================================
// PARTICLES
// ============================================================
function burst(x, y, color, n) {
  for (let i = 0; i < n; i++) {
    const a = Math.random() * Math.PI * 2;
    const spd = 1 + Math.random() * 3;
    G.particles.push({
      type:'spark', x, y,
      vx: Math.cos(a)*spd, vy: Math.sin(a)*spd,
      life:300, maxLife:300, color, r:3
    });
  }
}

function updateParticles(dt) {
  const mul = dt / 16.67;
  for (let i = G.particles.length - 1; i >= 0; i--) {
    const p = G.particles[i];
    p.life -= dt;
    if (p.life <= 0) { G.particles.splice(i,1); continue; }
    if (p.type === 'spark') {
      p.x += p.vx * mul; p.y += p.vy * mul;
      p.vx *= 0.93; p.vy *= 0.93;
    } else if (p.type === 'dmgFloat') {
      p.y -= 0.8 * mul;  // 向上飘
    }
  }
}

// ============================================================
// RENDER
// ============================================================
function render() {
  try {
    ctx.clearRect(0, 0, CW, CH);

    // BG gradient
    const grad = ctx.createLinearGradient(0,0,0,CH);
    grad.addColorStop(0, '#0d1520');
    grad.addColorStop(1, '#0a1018');
    ctx.fillStyle = grad;
    ctx.fillRect(0,0,CW,CH);

    drawField();
    drawParticles();
    drawBullets();
    drawSupport();
    drawEnemies();
    drawWeapons();
    // weapon information panel has been removed - icon + level drawn in drawWeapons
    drawHUDCanvas();

    // 未开始游戏 - 显示关卡选择
    if (!G.levelStarted && !G.running) {
      // 黑色半透明覆盖
      ctx.fillStyle = 'rgba(0,0,0,0.7)';
      ctx.fillRect(0, 0, CW, CH);
      
      // 标题
      ctx.font = 'bold 28px sans-serif';
      ctx.fillStyle = '#ffeb3b';
      ctx.textAlign = 'center';
      ctx.fillText('塔防游戏', CW/2, 80);
      
      // 难度选按钮
      const levels = [
        {lv:1, diff:1.0, color:'#66ff66', text:'简单'},
        {lv:2, diff:1.3, color:'#ffff66', text:'普通'},
        {lv:3, diff:1.7, color:'#ff9966', text:'困难'},
        {lv:4, diff:2.2, color:'#ff6666', text:'地狱'}
      ];
      
      const btnY = [150, 200, 250, 300];
      for (let i = 0; i < 4; i++) {
        const l = levels[i];
        const y = btnY[i];
        // 按钮背景
        ctx.fillStyle = l.color + '22';
        ctx.strokeStyle = l.color;
        ctx.lineWidth = 2;
        ctx.fillRect(CW/2 - 80, y - 15, 160, 30);
        ctx.strokeRect(CW/2 - 80, y - 15, 160, 30);
        // 文字
        ctx.font = 'bold 14px sans-serif';
        ctx.fillStyle = l.color;
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillText(`关卡 ${l.lv}: ${l.text}`, CW/2, y);
      }
      
      ctx.font = '11px sans-serif';
      ctx.fillStyle = '#888';
      ctx.fillText('点击选择难度开始游戏', CW/2, 360);
    }
    
    // 波之间倒计时
    else if (G.countdownMs > 0 && !G.levelCompleted) {
      ctx.fillStyle = 'rgba(0,0,0,0.5)';
      ctx.fillRect(0, 0, CW, CH);
      
      const secs = Math.ceil(G.countdownMs / 1000);
      ctx.font = 'bold 48px sans-serif';
      ctx.fillStyle = '#ffff66';
      ctx.textAlign = 'center';
      ctx.fillText(secs, CW/2, CH/2 + 50);
      
      ctx.font = '18px sans-serif';
      ctx.fillStyle = '#aaccff';
      ctx.fillText('下一波即将开始', CW/2, CH/2 - 20);
    }
    
    // 关卡完成 - 选择继续或结束
    else if (G.levelCompleted && !G.running) {
      ctx.fillStyle = 'rgba(0,0,0,0.8)';
      ctx.fillRect(0, 0, CW, CH);
      
      ctx.font = 'bold 28px sans-serif';
      ctx.fillStyle = '#66ff66';
      ctx.textAlign = 'center';
      ctx.fillText('关卡完成！', CW/2, 80);
      
      ctx.font = '16px sans-serif';
      ctx.fillStyle = '#aaffaa';
      ctx.fillText(`关卡 ${G.level} 难度 ${G.levelDifficulty.toFixed(1)}`, CW/2, 120);
      
      ctx.font = '14px sans-serif';
      ctx.fillStyle = '#ffff88';
      const goldEarned = Math.floor(G.gold);
      ctx.fillText(`获得金币: ${goldEarned}`, CW/2, 180);
      
      // 继续按钮
      ctx.fillStyle = '#ff9933aa';
      ctx.strokeStyle = '#ffff66';
      ctx.lineWidth = 2;
      ctx.fillRect(CW/2 - 70, 230, 140, 35);
      ctx.strokeRect(CW/2 - 70, 230, 140, 35);
      ctx.font = 'bold 16px sans-serif';
      ctx.fillStyle = '#fff';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText('下一关卡 →', CW/2, 247);
      
      // 退出按钮
      ctx.fillStyle = '#6666ff88';
      ctx.strokeStyle = '#8888ff';
      ctx.fillRect(CW/2 - 70, 280, 140, 35);
      ctx.strokeRect(CW/2 - 70, 280, 140, 35);
      ctx.fillStyle = '#aabbff';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText('离开游戏', CW/2, 297);
    }
  } catch (e) {
    console.error('[Render Error]', e.message, e.stack);
    ctx.fillStyle = '#ff0000';
    ctx.font = '12px sans-serif';
    ctx.fillText('渲染错误: ' + e.message, 10, 50);
  }
}

function drawField() {
  // Field boundary
  ctx.strokeStyle = 'rgba(255,255,255,0.05)';
  ctx.lineWidth = 1;
  ctx.setLineDash([4,6]);
  ctx.beginPath();
  ctx.moveTo(FIELD_L, SPAWN_Y); ctx.lineTo(FIELD_L, DEFENSE_Y);
  ctx.moveTo(FIELD_R, SPAWN_Y); ctx.lineTo(FIELD_R, DEFENSE_Y);
  ctx.stroke(); ctx.setLineDash([]);

  // Spawn zone
  ctx.fillStyle = 'rgba(255,80,80,0.07)';
  ctx.fillRect(FIELD_L, 0, FIELD_R-FIELD_L, SPAWN_Y + 10);
  ctx.font = '10px sans-serif';
  ctx.fillStyle = '#ff6666';
  ctx.textAlign = 'center';
  ctx.fillText('↓  怪物生成区  ↓', CW/2, 18);

  // Support fire lines
  for (let i = 0; i < 4; i++) {
    const p = supportPos(i);
    ctx.strokeStyle = 'rgba(80,200,120,0.12)';
    ctx.setLineDash([2,6]); ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.moveTo(FIELD_L, p.y); ctx.lineTo(FIELD_R, p.y);
    ctx.stroke(); ctx.setLineDash([]);
  }

  // Defense line - 血条显示 (居中)
  const defenseW = CW * 0.75;
  const defenseX = (CW - defenseW) / 2;
  const defenseBarH = 6;
  const defenseY = DEFENSE_Y - 3;
  
  // 背景框 (高度从30改为16，竖直方向宽度变小)
  ctx.fillStyle = 'rgba(0, 0, 0, 0.5)';
  ctx.fillRect(defenseX - 5, defenseY - 5, defenseW + 10, 16);
  ctx.strokeStyle = '#ff4444';
  ctx.lineWidth = 2;
  ctx.strokeRect(defenseX - 5, defenseY - 5, defenseW + 10, 16);
  
  // 血条背景
  ctx.fillStyle = '#330000';
  ctx.fillRect(defenseX, defenseY, defenseW, defenseBarH);
  
  // 血条
  const defensePercent = Math.max(0, G.defenseHp / G.maxDefenseHp);
  const hpColor = defensePercent > 0.5 ? '#00ff00' : (defensePercent > 0.2 ? '#ffff00' : '#ff0000');
  ctx.fillStyle = hpColor;
  ctx.fillRect(defenseX, defenseY, defenseW * defensePercent, defenseBarH);
  
  // 血条边框
  ctx.strokeStyle = hpColor;
  ctx.lineWidth = 1;
  ctx.strokeRect(defenseX, defenseY, defenseW, defenseBarH);
  
  // 文字标签
  ctx.font = 'bold 10px sans-serif';
  ctx.fillStyle = '#ffcccc';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText(`防 线 ${Math.ceil(G.defenseHp)}/${G.maxDefenseHp}`, defenseX + defenseW/2, defenseY - 8);
}

function drawEnemies() {
  const frozen = G.freezeMs > 0;
  for (const e of G.enemies) {
    const r = e.def.r;
    // Shadow
    ctx.beginPath();
    ctx.ellipse(e.x, e.y + r, r*0.7, 3, 0, 0, Math.PI*2);
    ctx.fillStyle = 'rgba(0,0,0,0.35)';
    ctx.fill();

    // Body
    ctx.beginPath(); ctx.arc(e.x, e.y, r, 0, Math.PI*2);
    ctx.fillStyle = frozen ? '#aaddff' : (G.slowAmt > 0.2 ? '#8888dd' : e.def.color);
    ctx.fill();
    if (e.def.isBoss) {
      ctx.strokeStyle = '#ff8800'; ctx.lineWidth = 2;
      ctx.beginPath(); ctx.arc(e.x, e.y, r, 0, Math.PI*2); ctx.stroke();
    }

    // Shield ring
    if (e.shield > 0) {
      ctx.beginPath(); ctx.arc(e.x, e.y, r+4, 0, Math.PI*2);
      ctx.strokeStyle = '#aaaaff'; ctx.lineWidth = 2.5; ctx.stroke();
    }

    // Emoji
    ctx.font = `${r*1.2}px sans-serif`;
    ctx.textAlign = 'center';
    ctx.fillText(e.def.emoji, e.x, e.y + r*0.4);

    // HP bar
    const bw = r*2+4, bh = 4, bx = e.x-r-2, by = e.y-r-8;
    ctx.fillStyle = '#222'; ctx.fillRect(bx, by, bw, bh);
    const hp = e.hp / e.maxHp;
    ctx.fillStyle = hp > 0.5 ? '#44ff44' : hp > 0.25 ? '#ffaa00' : '#ff4444';
    ctx.fillRect(bx, by, bw * hp, bh);
    if (e.shield > 0) {
      const sd = ENEMY_DEFS[e.type].shieldHp || 30;
      ctx.fillStyle = 'rgba(150,150,255,0.6)';
      ctx.fillRect(bx, by, bw * (e.shield / sd), bh);
    }

    // Boss crown
    if (e.def.isBoss) {
      ctx.font = '12px sans-serif';
      ctx.fillText('👑', e.x, e.y - r - 10);
    }
  }

  // Freeze overlay
  if (G.freezeMs > 0) {
    ctx.fillStyle = 'rgba(80,180,255,0.08)';
    ctx.fillRect(0, SPAWN_Y, CW, DEFENSE_Y - SPAWN_Y);
    ctx.font = 'bold 14px sans-serif';
    ctx.fillStyle = '#88ddff';
    ctx.textAlign = 'center';
    ctx.fillText(`❄️ 冻结 ${(G.freezeMs/1000).toFixed(1)}s`, CW/2, SPAWN_Y+30);
  }
  if (G.slowAmt > 0 && G.slowMs > 0) {
    ctx.font = '12px sans-serif';
    ctx.fillStyle = '#8888dd';
    ctx.textAlign = 'center';
    ctx.fillText(`🐌 减速${Math.round(G.slowAmt*100)}% ${(G.slowMs/1000).toFixed(1)}s`, CW/2, SPAWN_Y+48);
  }
}

function drawBullets() {
  for (const b of G.bullets) {
    ctx.beginPath();
    if (b.btype === 'rocket') {
      ctx.arc(b.x, b.y, 5, 0, Math.PI*2);
      ctx.fillStyle = '#ff8800';
    } else if (b.btype === 'sniper') {
      ctx.arc(b.x, b.y, 4, 0, Math.PI*2);
      ctx.fillStyle = '#00ffff';
    } else {
      ctx.arc(b.x, b.y, 3, 0, Math.PI*2);
      ctx.fillStyle = '#ffff88';
    }
    ctx.fill();
  }
}

function drawParticles() {
  for (const p of G.particles) {
    if (p.type === 'laser') {
      const a = p.life / p.maxLife;
      ctx.strokeStyle = `rgba(100,255,100,${a*0.9})`;
      ctx.lineWidth = 2;
      ctx.beginPath(); ctx.moveTo(p.x1,p.y1); ctx.lineTo(p.x2,p.y2); ctx.stroke();
    } else if (p.type === 'dmgFloat') {
      const a = Math.max(0, p.life / p.maxLife);
      ctx.font = 'bold 18px sans-serif';
      ctx.fillStyle = `rgba(255,102,102,${a})`;
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.shadowColor = 'rgba(0,0,0,0.8)';
      ctx.shadowBlur = 3;
      ctx.fillText('-' + p.dmg, p.x, p.y);
      ctx.shadowBlur = 0;
    } else {
      const a = p.life / p.maxLife;
      ctx.beginPath(); ctx.arc(p.x, p.y, p.r*a, 0, Math.PI*2);
      const hex = Math.round(a*255).toString(16).padStart(2,'0');
      ctx.fillStyle = p.color + hex;
      ctx.fill();
    }
  }
}

function drawWeapons() {
  const ti = G.curWeapon;
  const def = WEAPON_DEFS[ti];
  const lv = G.weaponLevels[ti];
  const x = weaponX(), y = WEAPON_Y;

  // Range circle
  const range = def.range * (1 + G.buffs.range);
  ctx.beginPath(); ctx.arc(x, y, range, 0, Math.PI*2);
  ctx.strokeStyle = 'rgba(255,255,255,0.03)'; ctx.lineWidth = 1; ctx.stroke();

  // Platform - upgrade color and border based on level
  const switching = G.weaponSwitchCd > 0;
  const colors = ['#ffcc00', '#ff8800', '#ff4400', '#ff0000', '#aa0000', '#550000'];
  const color = colors[Math.min(lv - 1, colors.length - 1)];
  
  // Border width increases with level (2-5px)
  const borderWidth = 2 + Math.min(lv - 1, 3);
  ctx.fillStyle = switching ? '#2a2a00' : color + '33';
  ctx.strokeStyle = switching ? '#ffff00' : color;
  ctx.lineWidth = borderWidth;
  ctx.beginPath(); ctx.roundRect(x-18, y-18, 36, 36, 6); ctx.fill(); ctx.stroke();

  // Icon
  ctx.font = '26px sans-serif'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.fillStyle = '#fff';
  ctx.fillText(def.icon, x, y);

  // Level indicator: stars below platform (bright yellow to stand out from border)
  ctx.font = '12px sans-serif';
  ctx.fillStyle = '#ffff66';
  ctx.textAlign = 'center'; ctx.textBaseline = 'top';
  const stars = '★'.repeat(lv);
  ctx.fillText(stars, x, y + 20);

  // Optional switching text
  if (switching) {
    ctx.font = '8px sans-serif'; ctx.fillStyle = '#ffff00';
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.fillText('切换中', x, y+26);
  }

  // upgrade button and cost to the right of weapon icon
  const cost = 10 + lv * 5;
  const btnW = 50, btnH = 22;
  const btnX = x + 28, btnY = y - btnH/2;
  ctx.fillStyle = G.gold >= cost ? 'rgba(76,255,100,0.3)' : 'rgba(255,100,100,0.3)';
  ctx.strokeStyle = G.gold >= cost ? '#4f4' : '#f44';
  ctx.lineWidth = 2;
  ctx.fillRect(btnX, btnY, btnW, btnH);
  ctx.strokeRect(btnX, btnY, btnW, btnH);
  ctx.font = 'bold 12px sans-serif';
  ctx.fillStyle = G.gold >= cost ? '#4f4' : '#f44';
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.fillText('升级', btnX + btnW/2, btnY + btnH/2);
  // cost text below button
  ctx.font = '10px sans-serif';
  ctx.fillStyle = '#aaa';
  ctx.textAlign = 'center'; ctx.textBaseline = 'top';
  ctx.fillText(cost + 'g', btnX + btnW/2, btnY + btnH + 2);
}

// weapon panel has been removed as part of UI simplification; details are now shown directly on the icon in drawWeapons.

function drawSupport() {
  for (let i = 0; i < 4; i++) {
    const pos = supportPos(i);
    const s   = G.supports[i];

    if (s) {
      const def = SUPPORT_DEFS[s.ti];
      // Gradient background for deployed support
      const grad = ctx.createLinearGradient(pos.x-18, pos.y-18, pos.x+18, pos.y+18);
      grad.addColorStop(0, '#1d4a20');
      grad.addColorStop(1, '#0d2a10');
      ctx.fillStyle = grad;
      ctx.lineWidth = 3;
      ctx.strokeStyle = '#4aff4a';
      ctx.beginPath(); ctx.roundRect(pos.x-18, pos.y-18, 36, 36, 6); ctx.fill(); ctx.stroke();
      // Glow effect
      ctx.strokeStyle = 'rgba(74,255,74,0.2)';
      ctx.lineWidth = 1;
      ctx.beginPath(); ctx.roundRect(pos.x-22, pos.y-22, 44, 44, 8); ctx.stroke();
      // Icon
      ctx.font = '22px sans-serif'; ctx.textAlign = 'center'; ctx.fillStyle = '#fff';
      ctx.fillText(def.icon, pos.x, pos.y+7);
      // Shots remaining
      ctx.font = 'bold 10px sans-serif'; ctx.fillStyle = '#ffff88';
      ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
      ctx.fillText(s.shots, pos.x, pos.y-10);
      // Arrow showing fire direction
      ctx.font = '14px sans-serif'; ctx.fillStyle = 'rgba(200,255,200,0.6)';
      ctx.fillText(pos.left ? '→' : '←', pos.x + (pos.left ? 28 : -28), pos.y+5);
    } else {
      // Empty slot with more visible border
      ctx.strokeStyle = 'rgba(100,180,100,0.5)'; 
      ctx.lineWidth = 2;
      ctx.setLineDash([4,4]);
      ctx.beginPath(); ctx.roundRect(pos.x-18, pos.y-18, 36, 36, 6); ctx.stroke();
      ctx.setLineDash([]);
      // Text label
      ctx.font = 'bold 11px sans-serif'; 
      ctx.fillStyle = 'rgba(120,200,120,0.7)'; 
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText(i<2 ? '◀L'+ i : 'R' + (i-2) +'▶', pos.x, pos.y+4);
    }
  }
}

function drawHUDCanvas() {
  // Wave counter during battle
  if (G.waveActive) {
    const rem = G.spawnQueue.length + G.enemies.length;
    if (rem > 0) {
      ctx.font = 'bold 11px sans-serif'; ctx.fillStyle = '#ff8888'; ctx.textAlign = 'left';
      ctx.fillText(`剩余敌人: ${rem}`, FIELD_L, SPAWN_Y + 14);
    }
  }
  
  // 更新和渲染浮动消息 - 从中间向顶部飘出
  if (!G.floatingMsgs) G.floatingMsgs = [];
  for (let i = G.floatingMsgs.length - 1; i >= 0; i--) {
    const msg = G.floatingMsgs[i];
    msg.timer -= 16.67;  // 每帧减少
    if (msg.timer <= 0) {
      G.floatingMsgs.splice(i, 1);
      continue;
    }
    
    // 从中间(CH/2)移到顶部(SPAWN_Y+28)的动画
    const progress = 1 - (msg.timer / msg.maxTimer);
    msg.y = CH/2 + (SPAWN_Y + 28 - CH/2) * progress;
    
    // 透明度从1逐渐到0
    const a = Math.max(0, msg.timer / 600);
    ctx.font = 'bold 14px sans-serif'; ctx.textAlign = 'center';
    ctx.shadowColor = 'rgba(0,0,0,0.9)'; ctx.shadowBlur = 5;
    ctx.fillStyle = `rgba(255,255,100,${a})`;
    ctx.fillText(msg.text, CW/2, msg.y);
    ctx.shadowBlur = 0;
  }
  
  if (G.cardTipMsg && G.selCard >= 0) {
    const tipW = 160, tipH = 110;
    const tipX = CW/2 - tipW/2, tipY = 80;
    ctx.fillStyle = 'rgba(20,20,30,0.9)';
    ctx.strokeStyle = '#88ccff';
    ctx.lineWidth = 2;
    ctx.fillRect(tipX, tipY, tipW, tipH);
    ctx.strokeRect(tipX, tipY, tipW, tipH);
    ctx.fillStyle = 'rgba(20,20,30,0.9)';
    ctx.beginPath();
    ctx.moveTo(CW/2, tipY + tipH);
    ctx.lineTo(CW/2 - 10, tipY + tipH + 10);
    ctx.lineTo(CW/2 + 10, tipY + tipH + 10);
    ctx.closePath();
    ctx.fill();
    const lines = G.cardTipMsg.text.split('\n');
    ctx.font = 'bold 11px sans-serif';
    ctx.fillStyle = '#88ccff';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'top';
    for (let i = 0; i < lines.length; i++) {
      ctx.fillText(lines[i], tipX + tipW/2, tipY + 8 + i * 16);
    }
  }
}

function updateHUD() {
  document.getElementById('hdGold').textContent = G.gold;
  document.getElementById('hdWave').textContent = `${G.wave}/${G.maxWave}`;
  document.getElementById('hdHp'  ).textContent = G.hp;
  const m = Math.floor(G.gameTime/60), s = Math.floor(G.gameTime%60);
  document.getElementById('hdTime').textContent = `${m}:${s.toString().padStart(2,'0')}`;

  // Pack button
  const pb = document.getElementById('buyPackBtn');
  pb.textContent = `🎁 ${PACK_NAMES[G.packLv]} ${G.packPrice}g`;
  pb.disabled = G.gold < G.packPrice || G.over;
  pb.className = `btn ${PACK_CSS[G.packLv]}`;

  // Wave button
  const wb = document.getElementById('waveBtn');
  if (G.over)        { wb.disabled = true; wb.textContent = '已结束'; }
  else if (G.waveActive) { wb.disabled = true; wb.textContent = '战斗中...'; }
  else if (G.wave >= G.maxWave) { wb.disabled = true; wb.textContent = '已完成'; }
  else { wb.disabled = false; wb.textContent = `▶ 第${G.wave+1}波`; }

  // Gambles
  document.getElementById('gamblesLeftLabel').textContent = `赌博:${G.gamblesLeft}次`;
  updateGamblingBtn();
}

function updateGamblingBtn() {
  const btn = document.getElementById('gamblingBtn');
  btn.disabled = G.gold < G.packPrice*2 || G.gamblesLeft <= 0 || G.over;
}

function updateBuffsDisplay() {
  const el = document.getElementById('buffsDisplay');
  const tags = [];
  if (G.buffs.damage > 0) tags.push(`⚔️ +${Math.round(G.buffs.damage*100)}%`);
  if (G.buffs.speed  > 0) tags.push(`⚡ +${Math.round(G.buffs.speed*100)}%`);
  if (G.buffs.range  > 0) tags.push(`🔭 +${Math.round(G.buffs.range*100)}%`);
  if (G.buffs.gold   > 0) tags.push(`🪙 +${Math.round(G.buffs.gold*100)}%`);
  el.innerHTML = tags.map(t=>`<span class="buff-tag">${t}</span>`).join('') || '';
}

// previous DOM-based weapon UI has been removed; weapon info is now drawn directly on canvas.
// ============================================================
// WAVES
// ============================================================
function startNextWave() {
  // 如果还没开始本关卡，先初始化关卡
  if (!G.levelStarted) {
    return;  // 由点击处理器调用会设置关卡
  }
  
  if (G.waveActive || G.wave >= G.maxWave || G.over || G.levelCompleted) return;
  G.wave++;
  G.waveActive = true;
  G.running    = true;
  G.countdownMs = 0;  // 清除倒计时

  // Reset per-wave
  G.packPrice  = 5;
  G.packBuys   = 0;
  G.packLv     = 0;
  G.gamblesLeft = 3;
  G.weaponCd = 0;
  G.weaponSwitchCd = 0;
  G.activeBuffs = {};
  G.activeSynergies = {};
  G.synergyBuffs = {};

  // Build spawn queue with difficulty scaling
  G.spawnQueue = [];
  for (const grp of WAVES[G.wave-1]) {
    const scaledN = Math.ceil(grp.n * G.levelDifficulty);
    for (let i = 0; i < scaledN; i++)
      G.spawnQueue.push({type: grp.t, wave: G.wave});
  }
  // Shuffle
  G.spawnQueue.sort(() => Math.random()-0.5);
  G.spawnTimer = 600;

  flash(`第 ${G.wave} 波来袭！`);
  updateHUD();
}

function waveComplete() {
  G.waveActive = false;
  if (G.wave >= G.maxWave) {
    // 关卡完成
    G.levelCompleted = true;
    G.running = false;
    flash(`🎉 关卡 ${G.level} 完成！`);
  } else {
    // 开始倒计时进入下一波（3秒）
    G.countdownMs = 3000;
    flash(`✅ 第 ${G.wave} 波完成！准备下一波`);
  }
  updateHUD();
}

// CARDS

function buyPack() {
  if (G.gold < G.packPrice || G.over) return;
  G.gold      -= G.packPrice;
  G.packPrice += 2;
  G.packBuys++;

  // Update pack level
  for (let i = PACK_THRESHOLDS.length-1; i >= 0; i--) {
    if (G.packBuys >= PACK_THRESHOLDS[i]) { G.packLv = i; break; }
  }

  const newCards = [];
  for (let i = 0; i < 3; i++) {
    newCards.push({
      id: Math.random().toString(36).slice(2),
      def: CARD_DEFS[Math.floor(Math.random()*CARD_DEFS.length)],
      lv:  rollPackCardLevel(G.packLv),
    });
  }
  G.cards.push(...newCards);

  updateHUD();
  showPackReveal(newCards);
}

function rollPackCardLevel(packLv) {
  const r = Math.random();
  if (packLv === 0) return 1;
  if (packLv === 1) return r < 0.70 ? 1 : 2;
  if (packLv === 2) return r < 0.50 ? 1 : r < 0.90 ? 2 : 3;
  return r < 0.30 ? 1 : r < 0.80 ? 2 : 3;
}

function selectCard(i) {
  if (G.selCard === i) {
    useCard(i); return;
  }
  if (G.selCard >= 0) {
    if (tryMerge(G.selCard, i)) return;
  }
  G.selCard = i;
  renderCards();
  
  // 显示卡牌信息冒泡提示
  const c = G.cards[i];
  if (c) {
    let tip = '';
    if (c.def.type === 'buff') {
      const wpnStr = c.def.wpn !== undefined ? `[${WEAPON_DEFS[c.def.wpn].name}专用]` : '';
      tip = `${c.def.icon} ${c.def.name} Lv${c.lv}\n效果: +${Math.round(c.def.fx[c.lv-1]*100)}% ${c.def.stat}\n${wpnStr}\n再次点击或与同牌合成`;
    } else if (c.def.type === 'synergy') {
      tip = `${c.def.icon} ${c.def.name} Lv${c.lv}\n组合效应\n需要: ${c.def.desc}\n加成: +${Math.round((c.def.bonus[c.lv-1]-1)*100)}% 伤害`;
    } else if (c.def.type === 'instant') {
      const fx = c.def.fx[c.lv-1];
      const fxText = c.def.id === 'freeze' || c.def.id === 'slow' ? fx/1000 : fx;
      tip = `${c.def.icon} ${c.def.name} Lv${c.lv}\n即时效果: ${fxText}\n点击使用`;
    }
    if (tip) {
      G.cardTipMsg = {text: tip, card: c, cardIdx: i};
    }
  }
}

function useCard(i) {
  const c = G.cards[i];
  if (!c) return;
  if (c.def.wpn !== undefined && G.curWeapon !== c.def.wpn) {
    flash(`⚠️ 需要装备 ${WEAPON_DEFS[c.def.wpn].name} 才能激活!`);
    return;
  }
  if (c.def.type === 'buff') {
    G.buffs[c.def.stat] += c.def.fx[c.lv-1];
    if (!G.activeBuffs) G.activeBuffs = {};
    G.activeBuffs[c.def.id] = true;
    flash(`${c.def.icon} ${c.def.name} Lv${c.lv} 激活! +${Math.round(c.def.fx[c.lv-1]*100)}%`);
    updateBuffsDisplay();
    checkSynergies();
  } else if (c.def.type === 'synergy') {
    flash(`⚠️ ${c.def.icon} ${c.def.name} 需要满足条件: ${c.def.desc}`);
    return;
  } else {
    applyInstant(c);
  }
  G.cards.splice(i, 1);
  G.selCard = -1;
  updateHUD();
  renderCards();
}

function applyInstant(c) {
  const fx = c.def.fx[c.lv-1];
  switch (c.def.id) {
    case 'bomb':
      for (let j = G.enemies.length-1; j >= 0; j--) dealDmg(G.enemies[j], fx);
      flash(`💥 全屏轰炸 ${fx} 伤害!`); break;
    case 'freeze':
      G.freezeMs = fx;
      flash(`❄️ 冻结 ${(fx/1000).toFixed(0)} 秒!`); break;
    case 'heal':
      G.hp = Math.min(20, G.hp + fx);
      flash(`💖 恢复 ${fx} 生命! 当前 HP: ${G.hp}`);
      updateHUD(); break;
    case 'slow':
      G.slowAmt = fx; G.slowMs = c.def.dur[c.lv-1];
      flash(`🐌 减速 ${Math.round(fx*100)}%!`); break;
  }
}

function tryMerge(i1, i2) {
  const c1 = G.cards[i1], c2 = G.cards[i2];
  if (!c1 || !c2 || c1===c2 || c1.def.id !== c2.def.id || c1.lv !== c2.lv || c1.lv >= 3) {
    G.selCard = i2;
    renderCards();
    return false;
  }
  const newCard = { id: Math.random().toString(36).slice(2), def: c1.def, lv: c1.lv+1 };
  const hi = Math.max(i1,i2), lo = Math.min(i1,i2);
  G.cards.splice(hi, 1); G.cards.splice(lo, 1);
  G.cards.splice(lo, 0, newCard);
  G.selCard = -1;
  flash(`✨ 合成! ${newCard.def.icon} ${newCard.def.name} → Lv${newCard.lv}`);
  renderCards();
  updateHUD();
  doAutoMerge();
  return true;
}

// Auto-merge: scan & merge all eligible pairs, chain until none remain
const _sleep = ms => new Promise(r => setTimeout(r, ms));
async function doAutoMerge() {
  if (!G.autoMerge || G._merging) return;
  G._merging = true;
  let total = 0;
  try {
    while (true) {
      // Find first mergeable pair
      let pi = -1, pj = -1;
      for (let i = 0; i < G.cards.length && pi === -1; i++)
        for (let j = i + 1; j < G.cards.length; j++)
          if (G.cards[i].def.id === G.cards[j].def.id &&
              G.cards[i].lv === G.cards[j].lv && G.cards[i].lv < 3)
            { pi = i; pj = j; break; }
      if (pi === -1) break;

      // Snapshot before touching DOM
      const defId  = G.cards[pi].def.id;
      const srcDef = G.cards[pi].def;
      const newLv  = G.cards[pi].lv + 1;
      const hi = Math.max(pi, pj), lo = Math.min(pi, pj);

      // Find the slot for this group; animate the shallowest back card out
      renderCards();
      const slot = [...document.getElementById('cardArea').children]
                     .find(el => el.dataset.defid === defId);
      const backEl = slot?.querySelector('.card-back');       // shallowest back
      const frontEl = slot?.querySelector('.card:not(.card-back)');
      if (backEl)  backEl.classList.add('merging-out');       // back card merges up
      else if (frontEl) frontEl.classList.add('merging-out'); // fallback (single card)
      await _sleep(240);

      // Perform the actual splice
      G.cards.splice(hi, 1);
      G.cards.splice(lo, 1);
      G.cards.splice(lo, 0, { id: Math.random().toString(36).slice(2), def: srcDef, lv: newLv });
      total++;

      // Render new state; spring-animate the upgraded front card
      renderCards();
      const newSlot  = [...document.getElementById('cardArea').children]
                         .find(el => el.dataset.defid === defId);
      const newFront = newSlot?.querySelector('.card:not(.card-back)');
      if (newFront) newFront.classList.add('merge-appear');
      await _sleep(130);  // brief gap before next iteration
    }
  } finally {
    G._merging = false;
  }
  if (total > 0) {
    flash(`⚡ 自动合成 ×${total}`);
    G.selCard = -1;
    updateHUD();
  }
}

function toggleAutoMerge() {
  G.autoMerge = !G.autoMerge;
  const btn = document.getElementById('autoMergeBtn');
  if (G.autoMerge) {
    btn.textContent = '⚡ 自动合成: 开';
    btn.classList.add('active');
    doAutoMerge(); // immediately process existing hand
  } else {
    btn.textContent = '⚡ 自动合成: 关';
    btn.classList.remove('active');
  }
}


// Group G.cards by def.id; each group sorted highest-level first
function groupCards() {
  const order = [], map = {};
  G.cards.forEach((card, idx) => {
    const key = card.def.id;
    if (!map[key]) { map[key] = []; order.push(key); }
    map[key].push({ card, idx });
  });
  return order.map(key => map[key].slice().sort((a, b) => b.card.lv - a.card.lv));
}

function renderCards() {
  const area = document.getElementById('cardArea');
  if (G.cards.length === 0) {
    area.innerHTML = '<div class="empty-hint">购买卡包获得卡牌 · 点选后点击使用 · 点两张相同牌合成升级</div>';
    return;
  }
  area.innerHTML = '';
  groupCards().forEach(group => {
    const { card: top, idx: topIdx } = group[0];
    const backs = group.slice(1);
    const isSel = G.selCard === topIdx;
    let isUsable = false;
    if (top.def.type === 'buff') isUsable = true;
    else if (top.def.type === 'synergy') isUsable = top.def.needs.every(id => G.activeBuffs && G.activeBuffs[id]);
    else if (top.def.type === 'instant') isUsable = true;

    // Slot wrapper
    const slot = document.createElement('div');
    slot.className = 'card-slot';
    slot.dataset.defid = top.def.id;

    // Back cards — stacked behind, offset down-right
    backs.forEach(({ card: bc }, k) => {
      const back = document.createElement('div');
      back.className = `card lv${bc.lv} card-back`;
      back.style.top    = `${(k + 1) * 5}px`;
      back.style.left   = `${(k + 1) * 4}px`;
      back.style.zIndex = backs.length - k;
      back.innerHTML = `<div class="card-icon" style="font-size:14px;opacity:0.45">${top.def.icon}</div>`
                     + `<div class="card-meta">Lv${bc.lv}</div>`;
      slot.appendChild(back);
    });

    // Front card
    const d = document.createElement('div');
    d.className = `card lv${top.lv}${isSel ? ' selected' : ''}${isUsable ? ' usable' : ''}`;
    d.style.cssText = 'position:absolute;top:0;left:0;z-index:10;';
    d.innerHTML = `<div class="card-icon">${top.def.icon}</div>`
                + `<div class="card-name">${top.def.name}</div>`
                + `<div class="card-meta">Lv${top.lv} ${top.def.type === 'buff' ? '永久' : '即时'}</div>`;
    if (group.length > 1) {
      const badge = document.createElement('div');
      badge.className = 'card-count-badge';
      badge.textContent = `×${group.length}`;
      d.appendChild(badge);
    }
    d.addEventListener('click', e => { e.stopPropagation(); selectCard(topIdx); });
    slot.appendChild(d);
    area.appendChild(slot);
  });
}

// ============================================================
// GAMBLING
// ============================================================
function openGambling() {
  if (G.gold < G.packPrice*2 || G.gamblesLeft <= 0 || G.over) return;
  const maxBet = Math.floor(G.gold * 0.5);
  document.getElementById('betInput').value  = Math.min(G.gold, G.packPrice*2);
  document.getElementById('betInput').max    = maxBet;
  document.getElementById('betInput').min    = G.packPrice;
  document.getElementById('gamblesLeft').textContent = G.gamblesLeft;
  document.getElementById('overlay').style.display       = 'block';
  document.getElementById('gamblingModal').style.display = 'block';
}
function closeGambling() {
  document.getElementById('overlay').style.display       = 'none';
  document.getElementById('gamblingModal').style.display = 'none';
}

function showPackReveal(newCards) {
  const container = document.getElementById('packRevealCards');
  container.innerHTML = '';
  newCards.forEach((c, k) => {
    const d = document.createElement('div');
    d.className = `card lv${c.lv}`;
    d.style.cssText = `position:relative;flex-shrink:0;
      animation:mergeAppear 0.4s cubic-bezier(0.34,1.56,0.64,1) both;
      animation-delay:${k * 0.12}s`;
    d.innerHTML = `<div class="card-icon">${c.def.icon}</div>`
                + `<div class="card-name">${c.def.name}</div>`
                + `<div class="card-meta">Lv${c.lv} ${c.def.type === 'buff' ? '永久' : '即时'}</div>`;
    container.appendChild(d);
  });
  document.getElementById('overlay').style.display        = 'block';
  document.getElementById('packRevealModal').style.display = 'block';
}

function closePackReveal() {
  const modal = document.getElementById('packRevealModal');
  if (!modal || modal.style.display === 'none') return;
  document.getElementById('overlay').style.display = 'none';
  modal.style.display = 'none';
  renderCards();
  doAutoMerge();
}

function doGamble(risk) {
  const bet = parseInt(document.getElementById('betInput').value);
  const maxBet = Math.floor(G.gold * 0.5);
  if (!bet || bet < 1 || bet > G.gold || bet > maxBet) {
    flash(`投注范围 1~${maxBet}g`); return;
  }
  G.gamblesLeft--;
  closeGambling();
  const cfg = {conservative:[0.7,1.5,'保守'],balanced:[0.5,2.0,'平衡'],aggressive:[0.3,3.0,'激进']}[risk];
  const won = Math.random() < cfg[0];
  if (won) {
    const earn = Math.round(bet * cfg[1]);
    G.gold += earn;
    flash(`🎰 ${cfg[2]}获胜! +${earn}g (×${cfg[1]})`);
  } else {
    G.gold -= bet;
    flash(`🎰 ${cfg[2]}失败! -${bet}g`);
  }
  updateHUD();
}

// ============================================================
// WEAPON CYCLING & UPGRADE
// ============================================================
function upgradeWeapon() {
  const ti = G.curWeapon;
  const def = WEAPON_DEFS[ti];
  const cost = 10 + G.weaponLevels[ti] * 5;
  if (G.gold < cost) { flash(`需要 ${cost}g (现有 ${G.gold}g)`); return; }
  G.gold -= cost;
  G.weaponLevels[ti]++;
  const lv = G.weaponLevels[ti];
  flash(`${def.icon}${def.name} 升级到 Lv${lv}! 伤害更强！`);
  updateHUD();
  updateWeaponUI();
}

// ============================================================
// GAME OVER
// ============================================================
function triggerGameOver(win) {
  G.over = true; G.running = false;
  const scr = document.getElementById('gameOverScreen');
  scr.className = win ? 'victory' : '';
  document.getElementById('goTitle').textContent = win ? '🏆 胜利!' : '💀 防线失守!';
  document.getElementById('goMsg').textContent   = win
    ? `成功防守 ${G.maxWave} 波！最终生命 ${G.hp} 剩余金币 ${G.gold}`
    : `防线在第 ${G.wave} 波被攻破`;
  scr.style.display = 'block';
}

// ============================================================
// FLASH MESSAGE
// ============================================================
function flash(msg) {
  // 添加浮动消息
  if (!G.floatingMsgs) G.floatingMsgs = [];
  G.floatingMsgs.push({text: msg, y: CH/2, timer: 2800, maxTimer: 2800});
  console.log('[VD]', msg);
}

// ============================================================
// MISC INPUT
// ============================================================
document.addEventListener('click', () => {
  if (G.selCard >= 0) { G.selCard = -1; G.cardTipMsg = null; renderCards(); }
});

// ============================================================
// START
// ============================================================
init();
</script>
